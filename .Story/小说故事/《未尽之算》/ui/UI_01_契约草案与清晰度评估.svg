<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .subtitle { font: 600 16px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .label { font: 600 14px Arial, "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .text { font: 14px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .muted { font: 12px Arial, "Microsoft YaHei", sans-serif; fill: #64748B; }
      .panel { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.5; rx: 12; }
      .field { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; rx: 8; }
      .btn { fill: #0F172A; rx: 8; }
      .btn-text { font: 600 14px Arial, "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .badge { fill: #E2E8F0; rx: 6; }
      .badge-text { font: 600 12px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>

  <text x="40" y="52" class="title">契约草案与清晰度评估</text>
  <text x="40" y="80" class="subtitle">触发点：契约草案完成 → 清晰度评估</text>

  <rect x="40" y="110" width="640" height="700" class="panel"/>
  <text x="60" y="140" class="label">契约草案</text>

  <rect x="60" y="160" width="600" height="90" class="field"/>
  <text x="75" y="185" class="label">must_land（可验证命题）</text>
  <text x="75" y="210" class="muted">例：罗生发现黑名单文件不是删除而是转移</text>

  <rect x="60" y="260" width="600" height="100" class="field"/>
  <text x="75" y="285" class="label">三线素材（生活 / 学问 / 历史）</text>
  <text x="75" y="310" class="muted">生活锚点、行业武器、历史镜像</text>

  <rect x="60" y="370" width="600" height="90" class="field"/>
  <text x="75" y="395" class="label">付费点与尾钩</text>
  <text x="75" y="420" class="muted">决定时刻 + 下一集悬念</text>

  <rect x="60" y="470" width="600" height="90" class="field"/>
  <text x="75" y="495" class="label">禁元 / 红线 / 不出现项</text>
  <text x="75" y="520" class="muted">角色禁元、伏笔未到期、主题禁区</text>

  <rect x="60" y="570" width="600" height="90" class="field"/>
  <text x="75" y="595" class="label">字数 / 节奏 / 情绪</text>
  <text x="75" y="620" class="muted">min / target / max + 结局色调</text>

  <rect x="720" y="110" width="640" height="700" class="panel"/>
  <text x="740" y="140" class="label">清晰度评估</text>

  <rect x="740" y="160" width="600" height="110" class="field"/>
  <text x="755" y="185" class="label">模糊点 #1</text>
  <text x="755" y="210" class="text">“主角有所领悟” → 领悟什么？</text>
  <rect x="755" y="225" width="70" height="24" class="badge"/>
  <text x="770" y="242" class="badge-text">补充</text>
  <rect x="835" y="225" width="70" height="24" class="badge"/>
  <text x="850" y="242" class="badge-text">忽略</text>

  <rect x="740" y="280" width="600" height="110" class="field"/>
  <text x="755" y="305" class="label">模糊点 #2</text>
  <text x="755" y="330" class="text">exit_to 未声明出口情绪</text>
  <rect x="755" y="345" width="70" height="24" class="badge"/>
  <text x="770" y="362" class="badge-text">补充</text>
  <rect x="835" y="345" width="70" height="24" class="badge"/>
  <text x="850" y="362" class="badge-text">忽略</text>

  <rect x="740" y="400" width="600" height="110" class="field"/>
  <text x="755" y="425" class="label">冲突项</text>
  <text x="755" y="450" class="text">结局色调：负，但尾钩是“轻松”</text>
  <rect x="755" y="465" width="70" height="24" class="badge"/>
  <text x="770" y="482" class="badge-text">修复</text>
  <rect x="835" y="465" width="70" height="24" class="badge"/>
  <text x="850" y="482" class="badge-text">退回</text>

  <rect x="740" y="520" width="600" height="90" class="field"/>
  <text x="755" y="545" class="label">清晰度评分</text>
  <text x="755" y="570" class="text">评分：78 / 100（可进入 CAP）</text>

  <rect x="40" y="825" width="1320" height="55" class="field"/>
  <text x="60" y="860" class="text">状态：🟡 有点模糊（建议补充 2 项）</text>

  <rect x="1110" y="835" width="110" height="36" class="btn"/>
  <text x="1138" y="858" class="btn-text">保存草案</text>
  <rect x="1230" y="835" width="130" height="36" class="btn"/>
  <text x="1260" y="858" class="btn-text">进入 CAP</text>
</svg>
