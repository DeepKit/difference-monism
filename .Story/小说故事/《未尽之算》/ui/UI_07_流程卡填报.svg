<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .subtitle { font: 600 16px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .label { font: 600 14px Arial, "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .text { font: 14px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .muted { font: 12px Arial, "Microsoft YaHei", sans-serif; fill: #64748B; }
      .panel { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.5; rx: 12; }
      .field { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; rx: 8; }
      .btn { fill: #0F172A; rx: 8; }
      .btn-text { font: 600 14px Arial, "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
    </style>
  </defs>
  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>

  <text x="40" y="52" class="title">流程卡填报（本集输入）</text>
  <text x="40" y="80" class="subtitle">填满必填项 → 生成契约</text>

  <rect x="40" y="110" width="640" height="320" class="panel"/>
  <text x="60" y="140" class="label">基本信息</text>
  <rect x="60" y="165" width="600" height="60" class="field"/>
  <text x="75" y="195" class="text">卷号 / 集号 / 主视角 / 相位 / 模态 / 七序重心</text>
  <rect x="60" y="235" width="600" height="60" class="field"/>
  <text x="75" y="265" class="text">结局色调 / 熵值</text>

  <rect x="40" y="450" width="640" height="320" class="panel"/>
  <text x="60" y="480" class="label">must_land</text>
  <rect x="60" y="505" width="600" height="70" class="field"/>
  <text x="75" y="545" class="muted">可验证命题 1</text>
  <rect x="60" y="585" width="600" height="70" class="field"/>
  <text x="75" y="625" class="muted">可验证命题 2</text>

  <rect x="720" y="110" width="640" height="260" class="panel"/>
  <text x="740" y="140" class="label">三线素材</text>
  <rect x="740" y="165" width="600" height="60" class="field"/>
  <text x="755" y="195" class="text">生活线（锚点）</text>
  <rect x="740" y="235" width="600" height="60" class="field"/>
  <text x="755" y="265" class="text">学问线（武器）</text>
  <rect x="740" y="305" width="600" height="60" class="field"/>
  <text x="755" y="335" class="text">历史线（镜像）</text>

  <rect x="720" y="390" width="640" height="200" class="panel"/>
  <text x="740" y="420" class="label">付费点与尾钩</text>
  <rect x="740" y="445" width="600" height="60" class="field"/>
  <text x="755" y="475" class="text">决定时刻</text>
  <rect x="740" y="515" width="600" height="60" class="field"/>
  <text x="755" y="545" class="text">尾钩</text>

  <rect x="720" y="610" width="640" height="160" class="panel"/>
  <text x="740" y="640" class="label">禁元 / 红线 / 字数</text>
  <rect x="740" y="665" width="600" height="40" class="field"/>
  <text x="755" y="692" class="text">禁元 / 红线</text>
  <rect x="740" y="710" width="600" height="40" class="field"/>
  <text x="755" y="737" class="text">min / target / max</text>

  <rect x="40" y="805" width="1320" height="55" class="field"/>
  <text x="60" y="840" class="text">状态：草案未生成契约（必填项待补）</text>

  <rect x="1000" y="815" width="110" height="36" class="btn"/>
  <text x="1027" y="838" class="btn-text">保存草案</text>
  <rect x="1120" y="815" width="110" height="36" class="btn"/>
  <text x="1147" y="838" class="btn-text">生成契约</text>
  <rect x="1240" y="815" width="110" height="36" class="btn"/>
  <text x="1267" y="838" class="btn-text">导出</text>
</svg>
