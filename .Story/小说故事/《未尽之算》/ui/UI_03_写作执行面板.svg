<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .subtitle { font: 600 16px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .label { font: 600 14px Arial, "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .text { font: 14px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .muted { font: 12px Arial, "Microsoft YaHei", sans-serif; fill: #64748B; }
      .panel { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.5; rx: 12; }
      .field { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; rx: 8; }
      .btn { fill: #0F172A; rx: 8; }
      .btn-text { font: 600 14px Arial, "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .progress { fill: #E2E8F0; rx: 6; }
      .progress-fill { fill: #22C55E; rx: 6; }
    </style>
  </defs>
  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>

  <text x="40" y="52" class="title">写作执行面板</text>
  <text x="40" y="80" class="subtitle">输入：契约 + 上下文包 → 输出：场景草稿</text>

  <rect x="40" y="110" width="300" height="700" class="panel"/>
  <text x="60" y="140" class="label">场景选择</text>
  <rect x="60" y="165" width="260" height="70" class="field"/>
  <text x="75" y="190" class="text">卷03 / 集07 / 场景02</text>
  <text x="75" y="210" class="muted">状态：active</text>
  <rect x="60" y="245" width="260" height="70" class="field"/>
  <text x="75" y="270" class="text">卷03 / 集07 / 场景03</text>
  <text x="75" y="290" class="muted">状态：blocked</text>
  <rect x="60" y="325" width="260" height="70" class="field"/>
  <text x="75" y="350" class="text">卷03 / 集08 / 场景01</text>
  <text x="75" y="370" class="muted">状态：draft</text>

  <rect x="360" y="110" width="640" height="700" class="panel"/>
  <text x="380" y="140" class="label">上下文包预览</text>
  <rect x="380" y="165" width="600" height="600" class="field"/>
  <text x="400" y="195" class="text">NL1 禁元规则…</text>
  <text x="400" y="220" class="text">NL2 写作硬规则…</text>
  <text x="400" y="245" class="text">NL3 故事基调…</text>
  <text x="400" y="270" class="text">NL4 声音样本…</text>
  <text x="400" y="295" class="text">NL5 场景乐谱…</text>
  <text x="400" y="320" class="text">NL6 衔接段…</text>
  <text x="400" y="345" class="text">NL7 角色状态…</text>
  <text x="400" y="370" class="text">NL8 伏笔提醒…</text>
  <text x="400" y="395" class="text">NL9 写作知识…</text>
  <text x="400" y="420" class="text">NL10 最佳实践…</text>
  <text x="400" y="445" class="text">NL11 Bug意向图…</text>
  <text x="400" y="470" class="text">NL12 纠正反馈…</text>

  <rect x="1020" y="110" width="340" height="700" class="panel"/>
  <text x="1040" y="140" class="label">写作控制</text>
  <rect x="1040" y="165" width="300" height="90" class="field"/>
  <text x="1055" y="190" class="text">模型等级：Sonnet</text>
  <text x="1055" y="215" class="muted">复杂度：中</text>

  <rect x="1040" y="265" width="300" height="90" class="field"/>
  <text x="1055" y="290" class="text">Token 预算：500</text>
  <rect x="1055" y="305" width="270" height="14" class="progress"/>
  <rect x="1055" y="305" width="190" height="14" class="progress-fill"/>

  <rect x="1040" y="365" width="300" height="90" class="field"/>
  <text x="1055" y="390" class="text">输出进度</text>
  <rect x="1055" y="405" width="270" height="14" class="progress"/>
  <rect x="1055" y="405" width="120" height="14" class="progress-fill"/>

  <rect x="1040" y="475" width="300" height="110" class="field"/>
  <text x="1055" y="500" class="text">操作</text>
  <rect x="1055" y="515" width="90" height="32" class="btn"/>
  <text x="1076" y="537" class="btn-text">开始</text>
  <rect x="1155" y="515" width="90" height="32" class="btn"/>
  <text x="1176" y="537" class="btn-text">暂停</text>
  <rect x="1255" y="515" width="85" height="32" class="btn"/>
  <text x="1270" y="537" class="btn-text">中止</text>

  <rect x="1040" y="595" width="300" height="170" class="field"/>
  <text x="1055" y="620" class="text">草稿预览</text>
  <text x="1055" y="645" class="muted">显示最近 200 字</text>

  <rect x="40" y="825" width="1320" height="55" class="field"/>
  <text x="60" y="860" class="text">状态：writing（第 1 轮）</text>
</svg>
