<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ASTO - 数集变迁存在论</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 300;
    }
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.7;
      margin-bottom: 3rem;
    }
    .buttons {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: block;
      padding: 1.5rem 3rem;
      font-size: 1.3rem;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      transition: all 0.3s;
    }
    .btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    .auto-hint {
      margin-top: 3rem;
      font-size: 0.9rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ASTO</h1>
    <p class="subtitle">数集变迁存在论 · Set Transition Ontology</p>
    <div class="buttons">
      <a href="zh/" class="btn">中文</a>
      <a href="en/" class="btn">English</a>
    </div>
    <p class="auto-hint">正在检测语言 / Detecting language...</p>
  </div>
  <script>
    // 自动跳转（3秒后，或立即点击按钮）
    setTimeout(function() {
      if (navigator.language.startsWith('zh')) {
        location.href = 'zh/';
      } else {
        location.href = 'en/';
      }
    }, 1500);
  </script>
</body>
</html>
